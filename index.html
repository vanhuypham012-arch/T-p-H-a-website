<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiệm Tạp Hóa Online</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome để dùng icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="navbar">
            <div class="logo">🛒 Tạp Hóa Xanh</div>
            <nav>
                <ul>
                    <li><a href="#">Trang chủ</a></li>
                    <li><a href="#">Sản phẩm</a></li>
                    <li id="login-btn"><a href="#"><i class="fas fa-user"></i> Đăng nhập</a></li>
                    <li class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                        <span id="cart-count">0</span>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <h1>Thực Phẩm Tươi Sạch Mỗi Ngày</h1>
            <p>Giao hàng tận nơi - Chất lượng tuyệt đối</p>
        </section>

        <section class="products">
            <h2>Sản phẩm nổi bật</h2>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Tìm kiếm sản phẩm...">
            </div>
            <div class="product-grid" id="product-list">
                <!-- Sản phẩm sẽ được render từ file script.js -->
            </div>
        </section>
    </main>

    <!-- Modal Đăng nhập -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <!-- Form Đăng nhập -->
            <div id="login-section">
                <h2>Đăng Nhập</h2>
                <form id="login-form">
                    <input type="text" placeholder="Tên đăng nhập" required>
                    <input type="password" placeholder="Mật khẩu" required>
                    <button type="submit">Vào cửa hàng</button>
                </form>
                <p style="margin-top: 15px; font-size: 14px;">Chưa có tài khoản? <a href="#" id="show-register" style="color: #27ae60; text-decoration: none; font-weight: bold;">Đăng ký ngay</a></p>
            </div>
            <!-- Form Đăng ký -->
            <div id="register-section" style="display: none;">
                <h2>Đăng Ký</h2>
                <form id="register-form">
                    <input type="text" placeholder="Tên đăng nhập" required>
                    <input type="email" placeholder="Email" required>
                    <input type="password" placeholder="Mật khẩu" required>
                    <input type="password" placeholder="Xác nhận mật khẩu" required>
                    <div id="register-error" class="error-message"></div>
                    <button type="submit">Tạo tài khoản</button>
                </form>
                <p style="margin-top: 15px; font-size: 14px;">Đã có tài khoản? <a href="#" id="show-login" style="color: #27ae60; text-decoration: none; font-weight: bold;">Đăng nhập</a></p>
            </div>
        </div>
    </div>

    <!-- Modal Giỏ hàng -->
    <div id="cart-modal" class="modal">
        <div class="modal-content cart-modal-content">
            <div class="cart-header">
                <h2>Giỏ hàng của bạn</h2>
                <span class="close-cart">&times;</span>
            </div>
            <div id="cart-items-container">
                <!-- Sản phẩm trong giỏ hàng sẽ hiện ở đây -->
            </div>
            <div class="cart-footer">
                <div class="total-section">Tổng cộng: <span id="cart-total-price">0</span> đ</div>
                <button id="checkout-btn" class="btn-checkout">Thanh toán</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 Tiệm Tạp Hóa Xanh</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
